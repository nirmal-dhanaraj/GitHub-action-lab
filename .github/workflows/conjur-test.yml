name: Conjur Cloud SaaS Lab

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually run the test from the GitHub UI

jobs:
  conjur-secret-fetch:
    runs-on: ubuntu-latest 
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Fetch Secret From Conjur Cloud
        uses: cyberark/conjur-action@v2.1.0
        with:
          url: https://anzservices.secretsmgr.cyberark.cloud
          account: conjur
          authn_id: GitHub
          # CRITICAL FIX: Single-line format prevents invisible newline strings
          secrets: 'data/vault/SQL-DB/Database-DB_MSSQL_LOC-10.0.0.50-db_admin/address|MY_DB_ADDRESS'

      # Verify step
      - name: Verify Secret Fetch
        run: |
          echo "The runner successfully fetched the secret!"
          echo "Database address fetched securely: $MY_DB_ADDRESS"
