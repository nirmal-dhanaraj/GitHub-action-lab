name: Conjur Cloud SaaS Lab

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually run the test from the GitHub UI

jobs:
  conjur-secret-fetch:
    runs-on: ubuntu-latest 
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Fetch Secret From Conjur Cloud
        uses: cyberark/conjur-action@v2.1.0
        with:
          url: https://anzservices.secretsmgr.cyberark.cloud/api
          account: conjur
          authn_id: GitHub
          host_id: 'host/data/apps/cicd-apps/github/nirmal-dhanaraj/GitHub-action-lab'
          # MULTI-SECRET FETCH: List each secret on its own line beneath the pipe (|) operator
          secrets: |
            data/vault/SQL-DB/Database-DB_MSSQL_LOC-10.0.0.50-db_admin/password|MY_DB_PASSWORD
            data/vault/SQL-DB/Database-DB_MSSQL_LOC-10.0.0.50-db_admin/address|MY_DB_ADDRESS
            data/vault/SQL-DB/Database-DB_MSSQL_LOC-10.0.0.50-db_admin/username|MY_DB_USERNAME

      # Verify step
      - name: Verify Secret Fetch
        run: |
          echo "The runner successfully fetched the secrets!"
          echo "Database username fetched securely: $MY_DB_USERNAME"
          echo "Database address fetched securely: $MY_DB_ADDRESS"
          echo "Database password fetched securely: $MY_DB_PASSWORD"
          
          echo "---------------------------------------------------"
          echo "TEMPORARY TESTING DEBUGS (Remove after verification)"
          echo "---------------------------------------------------"
          
          # Plaintext output with spaces for confirmation
          echo -n "Plaintext Username (with spaces): "
          echo "$MY_DB_USERNAME" | sed 's/./& /g'
          
          echo -n "Plaintext Address (with spaces): "
          echo "$MY_DB_ADDRESS" | sed 's/./& /g'
          
          echo -n "Plaintext Password (with spaces): "
          echo "$MY_DB_PASSWORD" | sed 's/./& /g'
